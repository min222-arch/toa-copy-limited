  height:22px;

  border-radius:50%;
  margin:auto;
  box-shadow:
    0 0 10px #ff1a1a,
    0 0 25px rgba(255,0,0,0.9),
    0 0 45px rgba(255,0,0,0.6);
  animation:bulbPulse 2.5s ease-in-out infinite;
}

/* BULB WIRE */
.bulb::before{
  content:"";
  position:absolute;
  top:-40px;
  left:50%;
  width:2px;
  height:40px;
  background:#444;
  transform:translateX(-50%);
}

.beam{
  width:0;
  height:0;
  margin:auto;
  border-left:120px solid transparent;
  border-right:120px solid transparent;
  border-top:200px solid rgba(255,0,0,0.25);
  filter:blur(2px);
  animation:beamGlow 3s ease-in-out infinite;
}

/* bulb pulsing */
@keyframes bulbPulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.1);}
  100%{transform:scale(1);}
}

/* beam breathing */
@keyframes beamGlow{
  0%{opacity:0.6;}
  50%{opacity:1;}
  100%{opacity:0.6;}
}

.edge-lights{

}

/* EACH LIGHT */
.edge-light{

}

/* LEFT LIGHT */
.edge-light.left{
  left:20px;

}

/* BULB */

    0 0 50px rgba(255,0,0,0.7);
  animation:bulbPulse 2.5s ease-in-out infinite;
}

/* WIRE */
.bulb::before{
  content:"";
  position:absolute;
  top:-35px;
  left:50%;
  width:2px;
  height:35px;
  background:#555;
  transform:translateX(-50%);
}

/* SHARP BEAM */
.beam{
  width:0;
  height:0;
  margin:auto;
  border-left:90px solid transparent;
  border-right:90px solid transparent;
  border-top:180px solid rgba(255,0,0,0.28);
  filter:blur(2px);
  animation:beamGlow 3s ease-in-out infinite;
}

/* LEFT = RED LIGHT */
.edge-light.left .bulb{
  background:#ff1a1a;
  box-shadow:
    0 0 12px #ff1a1a,
    0 0 35px rgba(255,0,0,1),
    0 0 70px rgba(255,0,0,0.8);
}

/* RIGHT = CYAN LIGHT */
.edge-light.right .bulb{
  background:#00eaff;
  box-shadow:
    0 0 12px #00eaff,
    0 0 35px rgba(0,234,255,1),
    0 0 70px rgba(0,234,255,0.8);
}

/* STRONG BEAM BASE */
.beam{
  position:relative;
  width:0;
  height:0;
  margin:auto;
  border-left:100px solid transparent;
  border-right:100px solid transparent;
  border-top:220px solid rgba(255,255,255,0.08);
}

/* LEFT COLOR BEAM */
.edge-light.left .beam{
  border-top-color:rgba(255,0,0,0.35);
}

/* RIGHT COLOR BEAM */
.edge-light.right .beam{
  border-top-color:rgba(0,234,255,0.35);
}

/* MULTIPLE RAYS */
.beam::before,
.beam::after{
  content:"";
  position:absolute;
  left:-100px;
  width:200px;
  height:220px;
  top:-220px;
  background:linear-gradient(
    to bottom,
    rgba(255,255,255,0.4),
    transparent 70%
  );
  transform-origin:top center;
}

/* LEFT RAY SPREAD */
.edge-light.left .beam::before{
  transform:rotate(-12deg);
  background:linear-gradient(
    to bottom,
    rgba(255,0,0,0.45),
    transparent 70%
  );
}

.edge-light.left .beam::after{
  transform:rotate(12deg);
  background:linear-gradient(
    to bottom,
    rgba(255,0,0,0.25),
    transparent 70%
  );
}

/* RIGHT RAY SPREAD */
.edge-light.right .beam::before{
  transform:rotate(-12deg);
  background:linear-gradient(
    to bottom,
    rgba(0,234,255,0.45),
    transparent 70%
  );
}

.edge-light.right .beam::after{
  transform:rotate(12deg);
  background:linear-gradient(
    to bottom,
    rgba(0,234,255,0.25),
    transparent 70%
  );
}

/* subtle pulsing intensity */
.beam,
.beam::before,
.beam::after{
  animation:beamPower 3s ease-in-out infinite;
}

@keyframes beamPower{
  0%{opacity:0.7;}
  50%{opacity:1;}
  100%{opacity:0.7;}
